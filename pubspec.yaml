name: md3Music
description: "EchoMusic style music player with Material Design 3"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  just_audio: ^0.9.34
  just_audio_background: ^0.0.1-beta.11
  audio_session: ^0.1.25
  http: ^1.2.1
  provider: ^6.1.2
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  on_audio_query: ^2.6.1
  path_provider: ^2.1.3
  intl: ^0.19.0
  dio: ^5.4.0
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
